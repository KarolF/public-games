<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Game Portal</h1>
    <p>A collection of web games</p>
  </header>
  <main>
    <div class="grid">
      <a href="./side-autobattler-brainrot/" class="card">
        <div class="thumb" style="background-color: #6c5ce7;">
          <span class="icon">⚔️</span>
        </div>
        <div class="info">
          <h2>Side Autobattler Brainrot</h2>
          <p>Auto-battler strategy game</p>
        </div>
      </a>
      <a href="./turbo-speedboat/" class="card">
        <div class="thumb" style="background-color: #0984e3;">
          <span class="icon">🚤</span>
        </div>
        <div class="info">
          <h2>Turbo Speedboat</h2>
          <p>High-speed racing action</p>
        </div>
      </a>
      <a href="./words-to-find-ts/" class="card">
        <div class="thumb" style="background-color: #00b894;">
          <span class="icon">🔤</span>
        </div>
        <div class="info">
          <h2>Words to Find</h2>
          <p>Word search puzzle game</p>
        </div>
      </a>
    </div>
  </main>
  <footer>
    <p>&copy; 2026 Game Portal</p>
  </footer>
</body>
</html>
